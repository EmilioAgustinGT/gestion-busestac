<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusesTAC - Acceso</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #0a84ff; --green: #32d74b; --text: #fff; --gray: #8e8e93; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 0.5px solid #333; }
        .btn { background: var(--blue); border: none; border-radius: 12px; color: #fff; padding: 16px; width: 100%; font-weight: 600; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-green { background: var(--green); }
        .input { background: #2c2c2e; border: none; border-radius: 10px; color: #fff; padding: 14px; width: 92%; margin-top: 10px; font-size: 16px; }
        #app { display: none; }
        .login-screen { text-align: center; margin-top: 50px; }
        
        /* Spinner de Carga */
        .loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--green); border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Modal iOS Elegante */
        .ios-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease; }
        .ios-modal-box { background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(20px); border-radius: 14px; width: 270px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: scale(1.1); transition: transform 0.3s ease; }
        .ios-modal-content { padding: 20px; font-size: 15px; font-weight: 500; line-height: 1.4; }
        .ios-modal-btn { border-top: 1px solid rgba(255,255,255,0.1); color: var(--blue); padding: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
        .ios-modal-btn:active { background: rgba(255,255,255,0.05); border-radius: 0 0 14px 14px; }
    </style>
</head>
<body>

    <div id="iosModal" class="ios-modal-overlay">
        <div class="ios-modal-box" id="iosModalBox">
            <div id="modalText" class="ios-modal-content">Mensaje</div>
            <div class="ios-modal-btn" onclick="cerrarAlerta()">OK</div>
        </div>
    </div>

    <div id="loading" class="loading-screen">
        <div class="spinner"></div>
    </div>

    <div id="login" class="login-screen">
        <h1 style="font-size: 32px; margin-bottom: 10px;">BusesTAC</h1>
        <p style="color: var(--gray);">Ingresa tus credenciales</p>
        <div class="card">
            <input type="text" id="user" class="input" placeholder="Usuario">
            <input type="password" id="pin" class="input" placeholder="PIN de 4 dígitos" maxlength="4" inputmode="numeric">
            <button class="btn" onclick="validarAcceso()">Entrar</button>
        </div>
    </div>

    <div id="app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="saludo">Hola</h2>
            <button onclick="salir()" style="background: none; border: none; color: var(--blue); font-size: 14px;">Salir</button>
        </div>

        <div class="card" style="text-align: center;">
            <div style="width: 70px; height: 70px; border: 6px solid #333; border-top: 6px solid var(--green); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-weight: bold;">85%</div>
            <p style="margin: 0; font-size: 14px; color: var(--gray);">Meta Bono Q300.00</p>
        </div>

        <div class="card">
            <h3>Cinépolis Portales</h3>
            <button class="btn" onclick="enviarAccion('Posicionamiento')">📍 Reportar Posición</button>
            <button id="btn-sync" class="btn" style="background: #ff9f0a; display: none;" onclick="sincronizar()">🔄 Sincronizar Pendientes</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby1n-21i6A8WrfirRZQyGVRRUO6wLpWO-PxrbiXj2Pe45Twj_hOyeL613NxW-udJDGZlA/exec"; 
        let usuarioActual = "";
        let pendientes = JSON.parse(localStorage.getItem('busestac_pendientes')) || [];

        // Funciones de UI
        function mostrarCarga() { document.getElementById('loading').style.display = 'flex'; }
        function ocultarCarga() { document.getElementById('loading').style.display = 'none'; }
        
        // Alerta iOS Personalizada
        function mostrarAlerta(mensaje) {
            document.getElementById('modalText').innerHTML = mensaje;
            const modal = document.getElementById('iosModal');
            const box = document.getElementById('iosModalBox');
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; box.style.transform = 'scale(1)'; }, 10);
        }
        function cerrarAlerta() {
            const modal = document.getElementById('iosModal');
            const box = document.getElementById('iosModalBox');
            modal.style.opacity = '0'; box.style.transform = 'scale(1.1)';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        function actualizarUI() {
            const btnSync = document.getElementById('btn-sync');
            if(pendientes.length > 0) {
                btnSync.style.display = 'block';
                btnSync.innerText = `🔄 Subir ${pendientes.length} reporte(s) guardado(s)`;
            } else {
                btnSync.style.display = 'none';
            }
        }

        async function validarAcceso() {
            const user = document.getElementById('user').value;
            const pin = document.getElementById('pin').value;
            if(!user || !pin) return mostrarAlerta("Por favor, completa tus credenciales.");

            if(!navigator.onLine) return mostrarAlerta("Necesitas internet para iniciar sesión.");

            mostrarCarga();
            try {
                const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ tipo: "login", usuario: user, pin: pin }) });
                const res = await resp.json();
                if(res.status === "success") {
                    usuarioActual = res.nombre;
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    document.getElementById('saludo').innerText = "Hola, " + res.nombre;
                    document.getElementById('pin').value = ""; // Limpiar pin
                    actualizarUI();
                } else { mostrarAlerta("Usuario o PIN incorrecto"); }
            } catch (e) { mostrarAlerta("Error de conexión"); } 
            finally { ocultarCarga(); }
        }

        function salir() {
            usuarioActual = "";
            document.getElementById('app').style.display = 'none';
            document.getElementById('login').style.display = 'block';
        }

        async function enviarAccion(fase) {
            if(!usuarioActual) return mostrarAlerta("Inicia sesión primero");
            const data = { tipo: "ruta", piloto: usuarioActual, cine: "Cinépolis Portales", accion: fase, fecha: new Date().toLocaleDateString() };

            if(navigator.onLine) {
                mostrarCarga();
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify(data), mode: 'no-cors' });
                    mostrarAlerta("✅ Reporte de ubicación enviado con éxito.");
                } catch(e) { guardarOffline(data); }
                ocultarCarga();
            } else {
                guardarOffline(data);
            }
        }

        function guardarOffline(data) {
            pendientes.push(data);
            localStorage.setItem('busestac_pendientes', JSON.stringify(pendientes));
            actualizarUI();
            mostrarAlerta("⚠️ <b>Sin señal.</b><br><br>Reporte guardado de forma segura en tu celular. Súbelo cuando tengas WiFi.");
        }

        async function sincronizar() {
            if(!navigator.onLine) return mostrarAlerta("Aún no tienes conexión a internet.");
            mostrarCarga();
            
            for(let i = pendientes.length - 1; i >= 0; i--) {
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify(pendientes[i]), mode: 'no-cors' });
                    pendientes.splice(i, 1);
                } catch(e) { break; }
            }
            
            localStorage.setItem('busestac_pendientes', JSON.stringify(pendientes));
            actualizarUI();
            ocultarCarga();
            if(pendientes.length === 0) mostrarAlerta("☁️ Todos los reportes han sido sincronizados.");
        }
    </script>
</body>
</html>
