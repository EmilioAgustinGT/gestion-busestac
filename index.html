<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusesTAC - Acceso</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #0a84ff; --green: #32d74b; --text: #fff; --gray: #8e8e93; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 0.5px solid #333; }
        .btn { background: var(--blue); border: none; border-radius: 12px; color: #fff; padding: 16px; width: 100%; font-weight: 600; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-green { background: var(--green); }
        .input { background: #2c2c2e; border: none; border-radius: 10px; color: #fff; padding: 14px; width: 92%; margin-top: 10px; font-size: 16px; }
        #app { display: none; } /* Oculto hasta que loguee */
        .login-screen { text-align: center; margin-top: 50px; }
        
        /* Pantalla de Carga (Spinner) */
        .loading-screen {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--green);
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-screen">
        <div class="spinner"></div>
        <p>Por favor espera...</p>
    </div>

    <div id="login" class="login-screen">
        <h1 style="font-size: 32px; margin-bottom: 10px;">BusesTAC</h1>
        <p style="color: var(--gray);">Ingresa tus credenciales</p>
        <div class="card">
            <input type="text" id="user" class="input" placeholder="Usuario">
            <input type="password" id="pin" class="input" placeholder="PIN de 4 dígitos" maxlength="4" inputmode="numeric">
            <button class="btn" onclick="validarAcceso()">Entrar</button>
        </div>
    </div>

    <div id="app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="saludo">Hola</h2>
            <button onclick="location.reload()" style="background: none; border: none; color: var(--blue); font-size: 14px;">Salir</button>
        </div>

        <div class="card" style="text-align: center;">
            <div style="width: 70px; height: 70px; border: 6px solid #333; border-top: 6px solid var(--green); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-weight: bold;">85%</div>
            <p style="margin: 0; font-size: 14px; color: var(--gray);">Meta Bono Q300.00</p>
        </div>

        <div class="card">
            <h3>Cinépolis Portales</h3>
            <button class="btn" onclick="enviarAccion('Posicionamiento')">📍 Reportar Posición</button>
            <button id="btn-sync" class="btn" style="background: #ff9f0a; display: none;" onclick="sincronizar()">🔄 Sincronizar Pendientes</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby1n-21i6A8WrfirRZQyGVRRUO6wLpWO-PxrbiXj2Pe45Twj_hOyeL613NxW-udJDGZlA/exec"; 
        let usuarioActual = "";
        const loading = document.getElementById('loading');
        const loginScreen = document.getElementById('login');
        const appScreen = document.getElementById('app');
        const greeting = document.getElementById('saludo');
        const btnSync = document.getElementById('btn-sync');
        
        // Memoria del teléfono
        let pendientes = JSON.parse(localStorage.getItem('busestac_pendientes')) || [];

        // Registrar Service Worker para abrir sin internet
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function mostrarCarga() { loading.style.display = 'flex'; }
        function ocultarCarga() { loading.style.display = 'none'; }

        function actualizarUI() {
            if(pendientes.length > 0) {
                btnSync.style.display = 'block';
                btnSync.innerText = `🔄 Subir ${pendientes.length} reporte(s) guardado(s)`;
            } else {
                btnSync.style.display = 'none';
            }
        }

        async function validarAcceso() {
            const user = document.getElementById('user').value;
            const pin = document.getElementById('pin').value;
            if(!user || !pin) return alert("Completa los datos");

            // Si no hay internet al loguearse, pero ya había entrado antes (opcional avanzado)
            if(!navigator.onLine) return alert("Necesitas internet para iniciar sesión la primera vez.");

            mostrarCarga();
            try {
                const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ tipo: "login", usuario: user, pin: pin }) });
                const res = await resp.json();
                if(res.status === "success") {
                    usuarioActual = res.nombre;
                    loginScreen.style.display = 'none';
                    appScreen.style.display = 'block';
                    greeting.innerText = "Hola, " + res.nombre;
                    actualizarUI();
                } else { alert("Usuario o PIN incorrecto"); }
            } catch (e) { alert("Error de conexión"); } 
            finally { ocultarCarga(); }
        }

        async function enviarAccion(fase) {
            if(!usuarioActual) return alert("Inicia sesión");
            const data = { tipo: "ruta", piloto: usuarioActual, cine: "Cinépolis Portales", accion: fase, fecha: new Date().toLocaleDateString() };

            // Verifica si el celular tiene señal
            if(navigator.onLine) {
                mostrarCarga();
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify(data), mode: 'no-cors' });
                    alert("¡Reportado con éxito!");
                } catch(e) { guardarOffline(data); }
                ocultarCarga();
            } else {
                guardarOffline(data);
            }
        }

        function guardarOffline(data) {
            pendientes.push(data);
            localStorage.setItem('busestac_pendientes', JSON.stringify(pendientes));
            actualizarUI();
            alert("⚠️ Sin señal. Reporte guardado en el celular. Súbelo cuando tengas WiFi.");
        }

        async function sincronizar() {
            if(!navigator.onLine) return alert("Aún no tienes internet.");
            mostrarCarga();
            
            // Envía los guardados uno por uno
            for(let i = pendientes.length - 1; i >= 0; i--) {
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify(pendientes[i]), mode: 'no-cors' });
                    pendientes.splice(i, 1); // Lo borra si se envió bien
                } catch(e) { break; } // Si falla, se detiene
            }
            
            localStorage.setItem('busestac_pendientes', JSON.stringify(pendientes));
            actualizarUI();
            ocultarCarga();
            if(pendientes.length === 0) alert("✅ Todos los reportes han sido sincronizados.");
        }
    </script>
</body>
</html>
